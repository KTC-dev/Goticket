name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'false'

      - name: Install Vercel CLI
        run: npm install -g vercel --legacy-peer-deps

      - name: Build
        run: |
          cd frontend
          npm install --legacy-peer-deps --ignore-engines || echo "Install failed, using existing build"
          npm run build || echo "Build failed, using existing build"

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel --token ${{ secrets.VERCEL_TOKEN }} --org-id ${{ secrets.VERCEL_ORG_ID }} --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}